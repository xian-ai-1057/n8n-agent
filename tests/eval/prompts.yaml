        required_types:
          - n8n-nodes-base.scheduleTrigger
          - n8n-nodes-base.googleSheets
          - n8n-nodes-base.gmail
          - n8n-nodes-base.slack
      # Completeness invariant: built node count must equal plan step count.
      # Evaluated by: len(final_workflow.nodes) == len(state.plan)
      completeness_invariant: nodes_equal_plan_steps
      validator_ok: true
      critic_pass: true
      deploy: skip
    tags: [schedule_trigger, output_sheet, output_email, output_slack, multi_step_chain]

  # ─────────────────────────── chat_tool_decision_precision ─────────────────
