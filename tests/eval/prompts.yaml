    expect:
      plan:
        min_steps: 2
        required_types:
          - n8n-nodes-base.webhook
          - n8n-nodes-base.jira
      validator_ok: true
      # 沒有 detail → builder 走 templates 降級；若 templates 也沒相似範例會是 empty shell,
      # critic 可能報 unbound_credential 或 empty_required_param。允許失敗作為觀測點。
      critic_pass: false
      deploy: skip
