        required_intents: [trigger, action, output]
        required_types:
          - n8n-nodes-base.scheduleTrigger
          - n8n-nodes-base.httpRequest
          - n8n-nodes-base.googleSheets
      validator_ok: true
      critic_pass: true
      deploy: skip
    tags: [schedule_trigger, http_request, output_sheet, multi_step_chain]

  - id: hourly_api_to_slack
