  # ─────────────────────────── completeness_check regression ──────────────
  # C1-1:B-COMP-03 — node count must equal plan step count (end-to-end gate)

  - id: completeness_ops_four_node_pipeline
    message: |
      每天早上 8 點把 Google Sheets 的銷售資料整理後寄 email 給主管，
      同時也發 Slack 訊息給 ops 頻道
